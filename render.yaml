# Render Blueprint for AI Recruiter Assistant
# To deploy: Go to Render Dashboard -> Blueprints -> New Blueprint Instance -> Select your GitHub repository.

services:
  # Backend API Service (FastAPI)
  - type: web
    name: ai-recruiter-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-recruiter-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-recruiter-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: RUN_CV_WORKER_IN_API
        value: "true"
      - key: EMBEDDING_PROVIDER
        value: "sentence-transformers" # Standard embeddings for search
      - key: LLM_PROVIDER
        value: "openai" # OpenAI is recommended for cloud deployment as Ollama is too heavy for Free tier
      - key: OPENAI_API_KEY
        sync: false # Set this in the Render Dashboard after deploying
      - key: CORS_ORIGINS_STR
        value: "https://ai-recruiter-frontend.onrender.com" # Update with your actual frontend URL after deployment
      - key: TRUSTED_HOSTS_STR
        value: "ai-recruiter-backend.onrender.com" # Update with your actual backend host after deployment

  # Frontend Web Service (Vite + React + TS)
  - type: web
    name: ai-recruiter-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: /api/v1
    routes:
      # Rewrite API requests to the backend service
      - type: rewrite
        source: /api/*
        destination: https://ai-recruiter-backend.onrender.com/api/* # Update this to your backend URL if changed
      # Fallback to index.html for Single Page App (SPA) client routing
      - type: rewrite
        source: /*
        destination: /index.html

  # Managed Redis for background tasks & rate limiting
  - type: redis
    name: ai-recruiter-redis
    plan: free
    ipAllowList: []

databases:
  # Managed PostgreSQL Database with pgvector support
  - name: ai-recruiter-db
    plan: free
