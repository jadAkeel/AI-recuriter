# Render Blueprint for AI Recruiter Assistant
# To deploy: Go to Render Dashboard -> Blueprints -> New Blueprint Instance -> Select your GitHub repository.

services:
  # Backend API Service (FastAPI)
  - type: web
    name: ai-recruiter-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: alembic upgrade head && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-recruiter-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-recruiter-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS_STR
        fromService:
          name: ai-recruiter-frontend
          type: web
          property: url
      - key: TRUSTED_HOSTS_STR
        value: "localhost,127.0.0.1"
      - key: RUN_CV_WORKER_IN_API
        value: "true"
      - key: EMBEDDING_PROVIDER
        value: "sentence-transformers"
      - key: LLM_PROVIDER
        value: "openai"
      - key: OPENAI_API_KEY
        sync: false # Set this in the Render Dashboard after deploying

  # Frontend Web Service (Vite + React + TS)
  - type: web
    name: ai-recruiter-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: ai-recruiter-backend
          type: web
          property: url
    routes:
      # SPA fallback: serve index.html for all client-side routes
      - type: rewrite
        source: /*
        destination: /index.html

  # Managed Redis for background tasks & rate limiting
  - type: redis
    name: ai-recruiter-redis
    plan: free
    ipAllowList: []

databases:
  # Managed PostgreSQL Database with pgvector support
  - name: ai-recruiter-db
    plan: free
